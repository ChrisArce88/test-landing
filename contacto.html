<head>

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">
    <a href="index.html">
      <img src="https://championcashloans.com/wp-content/uploads/2026/04/logotypo.png" alt="logotipo tipográfico">
    </a>
  </div>
  <div class="nav-links">
    <a href="faq.html">FAQ</a>
    <a href="contacto.html">Contacto</a>
    <a id="btnlink" href="tel:+123456789" class="call-btn track-call" data-label="navbar">855-HUICHO1</a>
  </div>
</nav>

<!-- CONTACT SECTION -->
<section class="contact-section">

  <h2 class="headline">Resolvemos rápido. Sin tantas vueltas.</h2>

  <!-- CTA principal -->
  <a href="tel:+123456789" class="btn-primary big track-call" data-label="btncontacto">
    ✆ Llamar ahora
  </a>
  <p class="microcopy">¡La forma más rápida de obtener tu dinero!</p>

  <!-- CTA secundario -->
  <a href="#" class="btn-secondary">
    💬 Enviar mensaje
  </a>
   <p class="microcopy">Deja tus datos y un agente se comunicará contigo en cuestión de minutos.</p>

  <!-- FORMULARIO -->
  <form 
    class="contact-form" 
    id="contactForm"
    action="https://forms.zohopublic.com/aldobettoni/form/HPRContacto/formperma/br824AfuCOjEIN9Qpi7YP_Nz-_weAi2ScjSGhcf8ECw/htmlRecords/submit"
    method="POST"
    accept-charset="UTF-8"
  >

    <!-- Hidden de Zoho -->
    <input type="hidden" name="zf_referrer_name" value="">
    <input type="hidden" name="zf_redirect_url" value="https://project-4fs8b.vercel.app/gracias.html">
    <input type="hidden" name="zc_gad" value="">

    <!-- Campos -->
    <input type="text" name="Name_First" placeholder="¿Cómo te llamas?" required>

    <input type="hidden" name="Name_Last" value="NA">

    <input type="tel" name="PhoneNumber_countrycode" placeholder="Tu número (te marcamos rápido)" required>

    <input type="hidden" name="Email" value="lead@hpr.com">

    <!-- Botón -->
    <button type="submit" id="submitBtn">
      <span class="btn-text">Quiero mi préstamo</span>
      <span class="btn-loading">Enviando...</span>
    </button>

  </form>

  <!-- Trust -->
  <div class="trust">
    <span>✔ Sin compromiso</span>
    <span>✔ Información confidencial</span>
    <span>✔ Atención rápida</span>
  </div>

</section>

</body>
</html>
